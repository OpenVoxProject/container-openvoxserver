---
name: Security Scanning 🕵️

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: security-scanning-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # minimal required permissions to clone repo

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.set-build-matrix.outputs.build_matrix }}
    steps:
      - name: Source checkout
        uses: actions/checkout@v6

      - name: 'Setup yq'
        uses: dcarbone/install-yq-action@v1.3.1

      - id: set-build-matrix
        run: echo "build_matrix=$(bash matrix.sh build)" >> $GITHUB_OUTPUT

  scan_ci_container:
    name: 'Scan ${{ matrix.os }} / ${{ matrix.platform }} CI container'
    runs-on: ${{ matrix.runner }}
    permissions:
      actions: read
      contents: read
      security-events: write
    needs: setup-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup-matrix.outputs.build_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build ${{ matrix.os }} / ${{ matrix.platform }} CI container
        uses: docker/build-push-action@v7
        with:
          tags: ci/openvoxserver:${{ matrix.server_version }}-${{ matrix.os }}-${{ matrix.platform }}
          context: .
          file: Containerfile.${{ matrix.os }}
          load: true
          push: false
          platforms: linux/${{ matrix.platform }}
          build-args: |
            OPENVOX_RELEASE=${{ matrix.release }}
            OPENVOXSERVER_VERSION=${{ matrix.server_version }}
            OPENVOXDB_VERSION=${{ matrix.db_version }}
            RUBYGEM_R10K=${{ matrix.rubygem_r10k }}
            RUBYGEM_RUGGED=${{ matrix.rubygem_rugged }}
            JDK_VERSION=${{ matrix.jdk_version }}

      - name: Scan image with Anchore Grype
        uses: anchore/scan-action@v7
        id: scan
        with:
          image: 'ci/openvoxserver:${{ matrix.server_version }}-${{ matrix.os }}-${{ matrix.platform }}'
          fail-build: false

      - name: Inspect action SARIF report
        run: jq . ${{ steps.scan.outputs.sarif }}

      - name: Upload Anchore scan SARIF report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: grype-${{ matrix.os }}-${{ matrix.platform }}
